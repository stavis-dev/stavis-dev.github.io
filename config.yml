baseURL: "https://stavis-dev.github.io/"
title: PaperMod
paginate: 5
theme: PaperMod
defaultContentLanguage: 'ru'

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
# googleAnalytics: UA-123-45

minify:
    disableXML: true
    # minifyOutput: true

languages:
    ru:
        languageName: "Русский"
        # languageName: ":ru:"
        languageAltTitle: Russian
        weight: 1
        title: Щпаргалка
        profileMode:
            enabled: false
            title: Stavis Vega
            # imageUrl: "#"
            # imageTitle: my image
            # imageWidth: 120
            # imageHeight: 120
            subtitle: "☄️ Fast | ☁️ Fluent | 🌙 Smooth | 📱 Responsive"
            buttons:
                - name: Blog
                  url: posts
                - name: Tags
                  url: tags
        menu:
            main:
                - name: Архив
                  url: archives
                  weight: 5
                - name: Python
                  url: python/
                  weight: 6
                - name: Поиск
                  url: search/
                  weight: 10
                - name: Тэги
                  url: tags/
                  weight: 10
                - name: Категории
                  url: categories/
                  weight: 10

    en:
        languageName: "English"
        weight: 2
        menu:
            main:
                - name: Archive
                  url: archives
                  weight: 5
                - name: Python
                  url: python/
                  weight: 6
                - name: Search
                  url: search/
                  weight: 10
                - name: Tags
                  url: tags/
                  weight: 10
                - name: Categories
                  url: categories/
                  weight: 10

outputs:
    home:
        - HTML
        - RSS
        - JSON

params:
    env: production # to enable google analytics, opengraph, twitter-cards and schema.
    description: "Копилка знаний и фишечек"
    author: Stavis Vega
    # author: ["Me", "You"] # multiple authors

    defaultTheme: auto
    # disableThemeToggle: true
    ShowShareButtons: true
    ShowReadingTime: true
    # disableSpecial1stPost: true
    displayFullLangName: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    ShowToc: true
    # comments: false
    images: ["papermod-cover.png"]

    profileMode:
        enabled: false
        title: PaperMod
        imageUrl: "#"
        imageTitle: my image
        # imageWidth: 120
        # imageHeight: 120
        buttons:
            - name: Archives
              url: archives
            - name: Tags
              url: tags

    homeInfoParams:
        Title: "Домашнаяя база знаний"
        Content: >
            Добро пожаловать, тут собрана база знаний и решений, 
            которые я решил "где то записать".  
            На самом деле я просто практикуюсь с генератором сайтов "hugo". 
            Так что пожалуйста строго не судите.  
            Темы базы абсолютно разные. От програмирования до...
            **Дважды подумайте**, прежде чем читать это...
           
    socialIcons:
        - name: github
          url: "https://github.com/stavis-dev"
        - name: KoFi
          url: "https://stavis-dev.github.io/"
        - name: RsS
          url: "index.xml"

    editPost:
        URL: "https://github.com/stavis-dev/stavis-dev.github.io/tree/main/content"
        Text: "Править текст" # edit text
        appendFilePath: true # to append file path to Edit link

    # label:
    #     text: "Home"
    #     icon: icon.png
    #     iconHeight: 35

    # analytics:
    #     google:
    #         SiteVerificationTag: "XYZabc"

    # assets:
    #     favicon: "<link / abs url>"
    #     favicon16x16: "<link / abs url>"
    #     favicon32x32: "<link / abs url>"
    #     apple_touch_icon: "<link / abs url>"
    #     safari_pinned_tab: "<link / abs url>"

    # cover:
    #     hidden: true # hide everywhere but not in structured data
    #     hiddenInList: true # hide on list pages and home
    #     hiddenInSingle: true # hide on single page

    # fuseOpts:
    #     isCaseSensitive: false
    #     shouldSort: true
    #     location: 0
    #     distance: 1000
    #     threshold: 0.4
    #     minMatchCharLength: 0
    #     keys: ["title", "permalink", "summary", "content"]

taxonomies:
    category: categories
    tag: tags
    series: series

markup:
    goldmark:
        renderer:
            unsafe: true
#     highlight:
#         # anchorLineNos: true
#         codeFences: true
#         guessSyntax: true
#         lineNos: true
#         # noClasses: false
#         style: monokai

privacy:
    vimeo:
        disabled: false
        simple: true

    twitter:
        disabled: false
        enableDNT: true
        simple: true

    instagram:
        disabled: false
        simple: true

    youtube:
        disabled: false
        privacyEnhanced: true

services:
    instagram:
        disableInlineCSS: true
    twitter:
        disableInlineCSS: true


